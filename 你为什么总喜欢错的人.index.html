<!DOCTYPE html>

<html lang="zh">

<head>

    <meta charset="UTF-8">

    <!-- 禁止缩放，全屏适配 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">

    <title>你为什么总是喜欢错的人</title>

    <!-- Chart.js 雷达图库 -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }




        body {

            min-height: 100vh;

            background: #0B1420;

            font-family: "思源宋体", "Source Han Serif", "Songti SC", "Times New Roman", serif;

            display: flex;

            align-items: center;

            justify-content: center;

        }




        /* 主容器：全屏卡片 */

        .app {

            position: relative;

            width: 100%;

            height: 100vh;

            background: linear-gradient(145deg, #0F172A 0%, #1E293B 70%, #2D1B3A 100%);

            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;

            color: #F0F0F0;

            overflow: hidden;

        }




        /* 页面容器 */

        .page {

            position: absolute;

            inset: 0;

            padding: 20px 24px;

            display: flex;

            flex-direction: column;

            transition: opacity 0.3s ease;

            overflow-y: auto;

            scrollbar-width: none;

            -ms-overflow-style: none;

            height: 100%;

        }

        .page::-webkit-scrollbar {

            display: none;

        }




        .page.hidden {

            opacity: 0;

            pointer-events: none;

        }




        /* ========== 首页 ========== */

        .cover {

            justify-content: space-between;

            align-items: center;

            text-align: center;

            padding-top: 2vh;

            padding-bottom: 2vh;

        }




        .cover-moon {

            width: min(25vw, 100px);

            height: min(25vw, 100px);

            background: radial-gradient(circle at 30% 30%, rgba(255, 250, 220, 0.7) 0%, rgba(255, 245, 200, 0.2) 70%);

            border-radius: 50%;

            filter: blur(16px);

            margin: 0 auto 0.5vh;

            animation: float 6s infinite alternate;

        }

        @keyframes float {

            0% { transform: translateY(0); opacity: 0.6; }

            100% { transform: translateY(-5px); opacity: 0.9; }

        }




        .cover-silhouette {

            width: min(35vw, 140px);

            height: min(45vw, 180px);

            margin: 0 auto;

            background: rgba(10, 15, 25, 0.7);

            border-radius: 100px 100px 40px 40px;

            position: relative;

            box-shadow: 0 15px 25px rgba(0,0,0,0.6);

        }

        .cover-silhouette::before {

            content: '';

            position: absolute;

            top: -12%;

            left: 25%;

            width: 50%;

            height: 30%;

            background: rgba(10, 15, 25, 0.8);

            border-radius: 50%;

        }




        .cover-title {

            margin: 1vh 0;

        }

        .main-title {

            font-size: clamp(2.2rem, 12vw, 3.5rem);

            font-weight: 700;

            color: #fff8ec;

            text-shadow: 0 0 30px rgba(255,240,200,0.6);

            line-height: 1.1;

        }

        .main-title small {

            font-size: 0.6em;

            display: block;

            font-weight: 300;

            letter-spacing: 0.2em;

            margin-top: 0.1em;

            color: #f0e0d0;

        }

        .sub-quote {

            font-size: clamp(0.8rem, 4vw, 1rem);

            color: #d8c8b0;

            border-top: 1px solid rgba(230,210,180,0.3);

            border-bottom: 1px solid rgba(230,210,180,0.3);

            display: inline-block;

            padding: 0.4em 1.2em;

            margin: 1vh 0;

            letter-spacing: 0.1em;

            background: rgba(0,0,0,0.2);

            backdrop-filter: blur(2px);

            border-radius: 40px;

        }




        .social-proof {

            font-size: clamp(0.75rem, 3.5vw, 0.9rem);

            color: #e0d0b0;

            background: rgba(255,235,200,0.1);

            padding: 0.4em 1.2em;

            border-radius: 40px;

            display: inline-block;

            margin: 0.5vh 0;

            border: 1px solid rgba(255,235,180,0.3);

        }




        .paid-status {

            font-size: clamp(0.9rem, 4.5vw, 1.1rem);

            color: #ffe5c0;

            background: rgba(255,215,150,0.15);

            backdrop-filter: blur(4px);

            padding: 0.6em 1.5em;

            border-radius: 40px;

            border: 1px solid rgba(255,235,180,0.4);

            display: inline-block;

            margin: 1vh 0 1.5vh;

            font-weight: 400;

            letter-spacing: 0.05em;

            box-shadow: 0 0 15px rgba(255,225,150,0.2);

        }




        .start-btn {

            background: rgba(255,245,230,0.15);

            backdrop-filter: blur(8px);

            border: 1px solid rgba(255,240,210,0.5);

            border-radius: 60px;

            padding: 0.8em 2.5em;

            font-size: clamp(1rem, 6vw, 1.3rem);

            color: #fff8e0;

            letter-spacing: 0.2em;

            box-shadow: 0 0 25px rgba(255,245,200,0.3);

            animation: btnPulse 2s infinite alternate;

            cursor: pointer;

            display: inline-block;

            border: 1px solid rgba(255,235,180,0.8);

            font-weight: 500;

            margin-top: 1vh;

        }

        @keyframes btnPulse {

            0% { box-shadow: 0 0 15px rgba(255,235,180,0.3); border-color: rgba(255,235,180,0.6); }

            100% { box-shadow: 0 0 30px rgba(255,225,150,0.8); border-color: rgba(255,245,200,1); }

        }




        .cover-footer {

            margin-bottom: 2vh;

        }




        /* ========== 个人信息页 ========== */

        .profile {

            justify-content: center;

            align-items: stretch;

            text-align: left;

            padding-top: 3vh;

        }




        .profile-card {

            background: rgba(20, 30, 45, 0.4);

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 235, 200, 0.15);

            border-radius: 40px;

            padding: 28px 24px;

            margin: 2vh 0 3vh;

            box-shadow: 0 20px 40px rgba(0,0,0,0.4);

        }




        .profile-title {

            font-size: clamp(1.5rem, 8vw, 2.2rem);

            font-weight: 600;

            color: #fff0e0;

            text-align: center;

            margin-bottom: 20px;

            letter-spacing: 2px;

        }




        .form-item {

            margin-bottom: 24px;

        }




        .form-label {

            display: block;

            font-size: clamp(0.9rem, 4vw, 1rem);

            color: #e0d0b8;

            margin-bottom: 8px;

            letter-spacing: 1px;

        }




        /* 年龄输入框 */

        .age-input {

            width: 100%;

            background: rgba(0,0,0,0.3);

            border: 1px solid rgba(255,235,180,0.3);

            border-radius: 60px;

            padding: 14px 20px;

            font-size: clamp(1rem, 4vw, 1.1rem);

            color: #fff0e0;

            outline: none;

            backdrop-filter: blur(4px);

            transition: all 0.2s;

        }

        .age-input:focus {

            border-color: #f5d5a0;

            box-shadow: 0 0 20px rgba(255,225,150,0.3);

        }

        .age-input::placeholder {

            color: rgba(255,235,200,0.4);

            font-size: 0.9rem;

        }




        /* 性别选择 */

        .gender-group {

            display: flex;

            gap: 15px;

            justify-content: space-between;

        }

        .gender-option {

            flex: 1;

            background: rgba(0,0,0,0.2);

            border: 1px solid rgba(255,235,180,0.2);

            border-radius: 60px;

            padding: 12px 0;

            text-align: center;

            font-size: clamp(1rem, 4vw, 1.1rem);

            color: #d8c8b0;

            cursor: pointer;

            transition: all 0.2s;

            backdrop-filter: blur(4px);

        }

        .gender-option.selected {

            background: rgba(255,215,150,0.2);

            border-color: #f5d5a0;

            color: #fff0e0;

            box-shadow: 0 0 15px rgba(255,225,150,0.3);

        }




        /* 职业选择（简洁下拉） */

        .occupation-select {

            width: 100%;

            background: rgba(0,0,0,0.3);

            border: 1px solid rgba(255,235,180,0.3);

            border-radius: 60px;

            padding: 14px 20px;

            font-size: clamp(1rem, 4vw, 1.1rem);

            color: #fff0e0;

            outline: none;

            backdrop-filter: blur(4px);

            appearance: none;

            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23f5d5a0' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");

            background-repeat: no-repeat;

            background-position: right 20px center;

            background-size: 16px;

        }

        .occupation-select option {

            background: #1e2a3a;

            color: #f0e0d0;

        }




        /* 免责声明 */

        .disclaimer {

            margin-top: 30px;

            padding: 16px 18px;

            background: rgba(0,0,0,0.2);

            border-radius: 40px;

            border-left: 4px solid #f5d5a0;

            font-size: clamp(0.8rem, 3.5vw, 0.9rem);

            color: #c0b8b0;

            line-height: 1.6;

            display: flex;

            align-items: center;

            gap: 10px;

        }

        .disclaimer-icon {

            font-size: 1.5rem;

            filter: drop-shadow(0 0 8px #f5d5a0);

        }




        .profile-btn {

            background: rgba(255,245,230,0.15);

            backdrop-filter: blur(8px);

            border: 1px solid rgba(255,235,180,0.6);

            border-radius: 60px;

            padding: 16px 20px;

            font-size: clamp(1.1rem, 5vw, 1.3rem);

            color: #fff8e0;

            letter-spacing: 4px;

            cursor: pointer;

            width: 100%;

            margin-top: 20px;

            transition: all 0.2s;

        }

        .profile-btn:hover {

            background: rgba(255,245,230,0.25);

            box-shadow: 0 0 30px rgba(255,225,150,0.5);

        }




        /* ========== 测试页 ========== */

        .test {

            background: transparent;

            padding-top: 2vh;

            display: flex;

            flex-direction: column;

            height: 100%;

        }

        .progress {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 2vh;

            font-family: sans-serif;

            flex-shrink: 0;

        }

        .progress-bar {

            flex: 1;

            height: 4px;

            background: rgba(255,255,255,0.2);

            border-radius: 2px;

            margin: 0 10px;

        }

        .progress-fill {

            height: 100%;

            width: 0%;

            background: #f5e5d5;

            border-radius: 2px;

            transition: width 0.2s;

        }

        .q-count {

            font-size: clamp(0.7rem, 3.5vw, 0.9rem);

            color: #cbc0b0;

        }




        .question {

            flex: 1;

            display: flex;

            flex-direction: column;

            min-height: 0;

        }

        .q-text {

            font-size: clamp(1.1rem, 5vw, 1.3rem);

            font-weight: 500;

            margin: 1vh 0 2vh;

            line-height: 1.5;

            color: #fff8ec;

            flex-shrink: 0;

        }

        .options {

            display: flex;

            flex-direction: column;

            gap: 1.5vh;

            flex-shrink: 0;

        }

        .option {

            background: rgba(255,245,240,0.05);

            border: 1px solid rgba(255,235,200,0.2);

            border-radius: 40px;

            padding: 2vh 18px;

            font-size: clamp(0.9rem, 4vw, 1rem);

            color: #e0d8d0;

            cursor: pointer;

            transition: all 0.2s;

            backdrop-filter: blur(2px);

            line-height: 1.4;

        }

        .option.selected {

            background: rgba(255,235,200,0.15);

            border-color: #f5e5d5;

            box-shadow: 0 0 20px rgba(255,225,150,0.3);

            color: #fff8ec;

            transform: scale(1.02);

        }




        .test-footer {

            margin-top: 2vh;

            display: flex;

            justify-content: space-between;

            align-items: center;

            flex-shrink: 0;

        }

        .nav-btn {

            background: rgba(255,245,230,0.1);

            backdrop-filter: blur(4px);

            border: 1px solid rgba(255,240,210,0.3);

            border-radius: 40px;

            padding: 1.5vh 25px;

            font-size: clamp(0.9rem, 4vw, 1rem);

            color: #f0e0d0;

            cursor: pointer;

            transition: all 0.2s;

        }

        .nav-btn:disabled {

            opacity: 0.3;

            pointer-events: none;

        }




        /* ========== 结果页 ========== */

        .result {

            background: transparent;

            overflow-y: auto;

            padding-bottom: 2vh;

        }

        .result-type {

            text-align: center;

            margin: 1.5vh 0 1vh;

        }

        .result-type .label {

            font-size: clamp(0.8rem, 3.5vw, 1rem);

            color: #d8d0c0;

            letter-spacing: 0.1em;

        }

        .result-type .type-name {

            font-size: clamp(2rem, 10vw, 2.8rem);

            font-weight: 600;

            color: #fff0e0;

            text-shadow: 0 0 20px rgba(255,220,150,0.4);

            margin: 0.5vh 0;

        }

        .radar-container {

            width: 100%;

            max-width: 280px;

            margin: 1vh auto;

            background: rgba(0,0,0,0.2);

            border-radius: 24px;

            padding: 8px;

        }

        canvas {

            width: 100%;

            height: auto;

            display: block;

        }

        .result-desc {

            background: rgba(0,0,0,0.2);

            backdrop-filter: blur(4px);

            border: 1px solid rgba(255,235,200,0.15);

            border-radius: 24px;

            padding: 18px;

            margin: 2vh 0;

            line-height: 1.7;

            color: #e5d8c8;

            font-size: clamp(0.9rem, 4vw, 1rem);

        }

        .full-report {

            margin: 2vh 0;

        }

        .report-section {

            background: rgba(0,0,0,0.15);

            backdrop-filter: blur(4px);

            border: 1px solid rgba(255,235,180,0.15);

            border-radius: 24px;

            padding: 16px;

            margin-bottom: 1.5vh;

        }

        .report-section h3 {

            color: #ffebd0;

            font-size: clamp(1rem, 5vw, 1.2rem);

            margin-bottom: 1vh;

            border-left: 4px solid #f5d5a0;

            padding-left: 10px;

        }

        .report-section p {

            color: #d8cfc0;

            font-size: clamp(0.85rem, 4vw, 0.95rem);

            line-height: 1.6;

            margin-bottom: 0.8vh;

        }

        .report-section ul {

            list-style: none;

            padding-left: 0;

        }

        .report-section li {

            padding: 0.6vh 0 0.6vh 22px;

            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23f5d5a0" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>') left center no-repeat;

            background-size: 14px;

            color: #e0d0b8;

            font-size: clamp(0.85rem, 4vw, 0.95rem);

        }

        .restart-btn {

            background: transparent;

            border: 1px solid rgba(255,255,255,0.2);

            border-radius: 40px;

            padding: 1.5vh 25px;

            color: #ccc0b0;

            cursor: pointer;

            margin: 2vh auto 1vh;

            display: block;

            width: fit-content;

            font-size: clamp(0.9rem, 4vw, 1rem);

            transition: all 0.2s;

        }

        .restart-btn:hover {

            background: rgba(255,255,255,0.05);

            border-color: rgba(255,255,255,0.3);

        }




        .hidden {

            display: none !important;

        }

    </style>

</head>

<body>

    <div class="app" id="app">

        <!-- 首页 -->

        <div class="page cover" id="coverPage">

            <div></div>

            <div>

                <div class="cover-moon"></div>

                <div class="cover-silhouette"></div>

                <div class="cover-title">

                    <div class="main-title">

                        为什么<br>总是喜欢<br><small>错的人</small>

                    </div>

                    <div class="sub-quote">测一测你的情感剧本</div>

                    <div class="social-proof">✨ 已有 23,456 人探索内心 ✨</div>

                </div>

            </div>

            <div class="cover-footer">

                <div class="paid-status">✨ 你的内心地图已就绪 ✨</div>

                <div class="start-btn" id="startBtn">开始探索</div>

            </div>

        </div>




        <!-- 个人信息页（新增） -->

        <div class="page profile hidden" id="profilePage">

            <div style="flex:1; display: flex; flex-direction: column; justify-content: center;">

                <div class="profile-title">✨ 先让我们认识你 ✨</div>

                <div class="profile-card">

                    <div class="form-item">

                        <label class="form-label">你的年龄</label>

                        <input type="number" class="age-input" id="ageInput" placeholder="例如 25" min="1" max="120">

                    </div>

                    <div class="form-item">

                        <label class="form-label">你的性别</label>

                        <div class="gender-group" id="genderGroup">

                            <div class="gender-option" data-gender="male">男</div>

                            <div class="gender-option" data-gender="female">女</div>

                            <div class="gender-option" data-gender="other">其他</div>

                        </div>

                    </div>

                    <div class="form-item">

                        <label class="form-label">你的职业</label>

                        <select class="occupation-select" id="occupationSelect">

                            <option value="" disabled selected>—— 请选择 ——</option>

                            <option value="学生">学生</option>

                            <option value="上班族">上班族</option>

                            <option value="自由职业">自由职业</option>

                            <option value="创业者">创业者</option>

                            <option value="艺术/创意">艺术/创意</option>

                            <option value="其他">其他</option>

                        </select>

                    </div>

                    <!-- 免责声明 -->

                    <div class="disclaimer">

                        <span class="disclaimer-icon">🧘</span>

                        <span>本测试仅为娱乐，旨在帮助你更好地了解自己。如果你正经历严重的情绪困扰或心理问题，请及时寻求专业心理咨询师或医生的帮助。关爱自己，从心开始。</span>

                    </div>

                </div>

                <div class="profile-btn" id="toTestBtn">进入内心世界</div>

            </div>

        </div>




        <!-- 测试页 -->

        <div class="page test hidden" id="testPage">

            <div class="progress">

                <span class="q-count" id="qCount">1 / 20</span>

                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 5%;"></div></div>

            </div>

            <div class="question" id="questionContainer">

                <div class="q-text" id="qText"></div>

                <div class="options" id="optionsContainer"></div>

            </div>

            <div class="test-footer">

                <div class="nav-btn" id="prevBtn" disabled>上一题</div>

                <div class="nav-btn" id="nextBtn">下一题</div>

            </div>

        </div>




        <!-- 结果页 -->

        <div class="page result hidden" id="resultPage">

            <div style="flex:1; overflow-y:auto; padding-right: 5px;">

                <div class="result-type">

                    <div class="label">你的情感剧本</div>

                    <div class="type-name" id="resultTypeName">守护者型</div>

                </div>

                <div class="radar-container">

                    <canvas id="radarChart" width="260" height="260"></canvas>

                </div>

                <div class="result-desc" id="resultDesc"></div>

                <div class="full-report" id="fullReport"></div>

                <div class="restart-btn" id="restartBtn">重新测试</div>

            </div>

        </div>

    </div>




    <script>

        (function() {

            // ---------- 题目数据 ----------

            const questions = [

                { text: "一群人聚会，你会最先注意到哪种人？", 

                  options: [

                      { text: "话不多但每句话都在点上的那个人", type: 1 }, 

                      { text: "全场最活跃、一直在逗大家笑的那个人", type: 2 },

                      { text: "默默照顾所有人、递纸巾倒水的那个人", type: 0 },

                      { text: "独自坐在角落、看起来有点神秘的那个人", type: 3 }

                  ]},

                { text: "前任做过最让你心动的一件事是？", 

                  options: [

                      { text: "在我最需要的时候，TA刚好出现了", type: 0 },

                      { text: "带我去了一个我从没去过的地方", type: 1 },

                      { text: "记住我随口说过的每一个小愿望", type: 2 },

                      { text: "什么都不做，只是陪着我", type: 3 }

                  ]},

                { text: "你觉得爱情里最让你上头的瞬间是？", 

                  options: [

                      { text: "TA说‘别怕，有我在’", type: 0 },

                      { text: "TA拉着我去冒险，做疯狂的事", type: 1 },

                      { text: "TA记得所有纪念日，给我惊喜", type: 2 },

                      { text: "TA安静地听我说完所有心事", type: 3 }

                  ]},

                { text: "如果用一个词形容你心动的人，你会选？", 

                  options: [

                      { text: "可靠", type: 0 },

                      { text: "有趣", type: 1 },

                      { text: "温柔", type: 2 },

                      { text: "深刻", type: 3 }

                  ]},

                { text: "你更容易对哪种人产生好感？", 

                  options: [

                      { text: "能给我安全感的人", type: 0 },

                      { text: "能带我体验新鲜事物的人", type: 1 },

                      { text: "能接住我情绪的人", type: 2 },

                      { text: "能和我深度交流的人", type: 3 }

                  ]},

                { text: "夜深人静的时候，你最常出现的念头是？", 

                  options: [

                      { text: "要是有个人在就好了", type: 0 },

                      { text: "我是不是不够好", type: 1 },

                      { text: "为什么总是我一个人扛", type: 2 },

                      { text: "到底什么时候才能遇到对的人", type: 3 }

                  ]},

                { text: "你和父母的关系，更像哪一种？", 

                  options: [

                      { text: "他们很爱我，但很少夸我", type: 1 },

                  ]},

                { text: "在感情中，你最渴望得到的是什么？", 

                  options: [

                      { text: "被坚定地选择", type: 0 },

                      { text: "被理解和接纳", type: 2 },

                      { text: "被激发和成长", type: 3 }

                  ]},

                { text: "你觉得自己内心最深处的空缺是什么？", 

                  options: [

                      { text: "安全感", type: 0 },

                      { text: "认可感", type: 1 },

                      { text: "归属感", type: 2 },

                      { text: "新鲜感", type: 3 }

                  ]},

                { text: "哪句话最容易让你破防？", 

                  options: [

                      { text: "你辛苦了", type: 0 },

                      { text: "你真厉害", type: 1 },

                      { text: "我懂你", type: 2 },

                      { text: "跟我走", type: 3 }

                  ]},

                { text: "回顾你的感情经历，有没有发现一个重复的剧本？", 

                  options: [

                      { text: "总是我先付出很多，然后对方慢慢冷淡", type: 0 },

                      { text: "总是被同一种类型的人吸引（比如都很爱玩）", type: 1 },

                      { text: "总是在快确定关系的时候，自己先退缩", type: 2 },

                      { text: "总是在一起后发现，对方和我一开始想的不一样", type: 3 }

                  ]},

                { text: "分手后，你通常会？", 

                  options: [

                      { text: "很快开始下一段，不想空窗", type: 1 },

                      { text: "很久都走不出来，反复想‘如果当初’", type: 2 },

                      { text: "表面没事，但很久不敢再碰感情", type: 3 },

                      { text: "复盘总结，觉得自己又成长了", type: 0 }

                  ]},

                { text: "你在一段感情中最容易扮演的角色是？", 

                  options: [

                      { text: "照顾者", type: 0 },

                      { text: "追随者", type: 1 },

                      { text: "观察者", type: 2 },

                      { text: "拯救者", type: 3 }

                  ]},

                { text: "你发现自己总是被同一类人伤害，这类人的特点是？", 

                  options: [

                      { text: "需要被照顾，但不懂得感恩", type: 0 },

                      { text: "自由洒脱，但不愿承诺", type: 1 },

                      { text: "情绪化，忽冷忽热", type: 2 },

                      { text: "看似需要拯救，实则无法改变", type: 3 }

                  ]},

                { text: "当感情出现问题时，你的第一反应是？", 

                  options: [

                      { text: "努力修复，付出更多", type: 0 },

                      { text: "试图改变对方", type: 1 },

                      { text: "逃避，等对方来解决", type: 2 },

                      { text: "思考这段关系是否值得", type: 3 }

                  ]},

                { text: "当朋友说‘你总遇到错的人’，你的第一反应是？", 

                  options: [

                      { text: "对啊，我命不好", type: 2 },

                      { text: "可能是我的问题，但我不知道是什么", type: 1 },

                      { text: "我知道我的模式，但改不了", type: 0 },

                      { text: "我已经在努力改变了", type: 3 }

                  ]},

                { text: "如果给你一个机会回到上一段感情开始的那天，你会？", 

                  options: [

                      { text: "告诉自己别开始", type: 2 },

                      { text: "还是想试试，但会换一种方式相处", type: 1 },

                      { text: "不知道该怎么做，太复杂了", type: 0 },

                      { text: "不想回去，现在这样挺好", type: 3 }

                  ]},

                { text: "你觉得自己在感情中最大的成长是？", 

                  options: [

                      { text: "学会了更爱自己", type: 3 },

                      { text: "学会了及时止损", type: 2 },

                      { text: "学会了如何付出", type: 0 },

                      { text: "学会了表达需求", type: 1 }

                  ]},

                { text: "你相信人可以改变自己的情感模式吗？", 

                  options: [

                      { text: "很难，但可以慢慢调整", type: 0 },

                      { text: "需要遇到对的人才能改变", type: 1 },

                      { text: "不太相信，我试过很多次了", type: 2 },

                      { text: "完全相信，我已经在变了", type: 3 }

                  ]},

                { text: "接下来你最想改变的是什么？", 

                  options: [

                      { text: "不再过度付出", type: 0 },

                      { text: "不再追逐错误的人", type: 1 },

                      { text: "不再害怕亲密", type: 2 },

                      { text: "不再试图拯救别人", type: 3 }

                  ]}

            ];




            const types = [

                {

                    name: "守护者型",

                    desc: "你总是在感情里付出最多的那个人。你记得TA的所有喜好，你包容TA的所有情绪，你把自己放得很低，只为了让对方舒服。但奇怪的是，最后受伤的总是你。你付出的越多，对方越不珍惜。你开始怀疑：是不是我不够好？其实，你只是用错了方式爱别人，也忘了爱自己。",

                    story: "你从小就被教导要懂事、要照顾别人。可能是家里的长子/长女，或者父母工作忙，你早早学会了察言观色。你的价值感来源于“被需要”，所以长大后，你会不自觉地被那些需要你的人吸引。",

                    trap: "你总是被“需要被照顾的人”吸引——那些有点颓废、有点迷茫、生活一团糟的人。你想成为他们的拯救者，用付出换取爱。但这类人往往不懂珍惜，把你的好当作理所当然。",

                    keys: [

                        "练习“延迟付出”：下次想为TA做什么时，等24小时。",

                        "建立“被爱清单”：写下10件让你感觉被爱的事，而不是你为别人做的事。",

                        "学会接受：你值得被爱，不需要用付出来交换。"

                    ],

                    ideal: "真正适合你的人，不是需要你照顾的人，而是懂得照顾你情绪的人。TA会在你付出时轻声说：“你也累了吧，我来。” TA能看见你的脆弱，允许你不那么坚强。"

                },

                {

                    name: "追逐者型",

                    desc: "你总是被那些闪闪发光、难以掌控的人吸引。你喜欢追逐的感觉，喜欢征服的过程。但一旦对方真的属于你了，你又开始觉得无聊、想逃离。你渴望的是激情，不是平淡。你害怕的不是失去，而是被束缚。你的爱情像一场冒险，但你需要问问自己：你到底想要的是那个人，还是追到那个人的感觉？",

                    story: "你成长过程中可能经常被拿来和别人比较，内心渴望证明自己“足够好”。你爱上的是“挑战”本身，而不是那个人。每一次征服，都让你短暂地觉得自己有价值。",

                    trap: "你容易被“光环型”的人吸引——那些在人群中耀眼、难以捉摸的人。你享受追逐的快感，但一旦关系稳定，激情消退，你就会感到空虚，然后开始寻找下一个目标。",

                    keys: [

                        "区分“心动”和“感情”：问自己，如果TA不再神秘，你还喜欢TA吗？",

                        "练习停留：当你想逃离一段稳定的关系时，先给自己一个月冷静期。",

                        "探索自我价值：你的价值不需要通过征服来证明。"

                    ],

                    ideal: "适合你的人，不是遥不可及的星星，而是能与你并肩看星星的人。TA有自己的光芒，但愿意为你停留；你不需要追逐，只需要并肩。"

                },

                {

                    name: "逃离者型",

                    desc: "你渴望亲密，但又害怕靠近。每次关系走到一定程度，你就会开始不安，然后找各种理由退缩。你担心一旦完全交付，就会受伤。所以你宁愿先走开，也不想被丢下。你把自己保护得很好，但也错过了很多真心。你需要的是一个能让你感到绝对安全的人，但首先，你得相信安全是可能的。",

                    story: "你可能在早期经历过被忽视或被抛弃的创伤，或者父母的关系让你对亲密产生恐惧。你学会了一个人，也习惯了孤独，但内心其实渴望被拥抱。",

                    trap: "你容易被“忽冷忽热”的人吸引——因为他们让你熟悉。他们的若即若离，正好印证了你“果然会受伤”的预言。你在这种不确定中反复确认自己的安全。",

                    keys: [

                        "识别预警信号：当你又想逃跑时，问自己：是对方真的不好，还是我害怕了？",

                        "练习“小暴露”：尝试一点点分享真实的感受，从最安全的对象开始。",

                        "建立安全感清单：写下那些让你感到安全的人、事、物，常去看看。"

                    ],

                    ideal: "适合你的人，是那个有耐心等你的人。TA不会因为你的退缩而离开，也不会逼你太快靠近。TA会用稳定的存在告诉你：你可以慢慢来，我在这里。"

                },

                {

                    name: "拯救者型",

                    desc: "你总是被那些“有问题”的人吸引——受过伤的、迷茫的、需要帮助的。你想成为那个带他们走出来的人，你想用爱治愈他们。但最后你发现，你改变不了任何人，反而把自己搭进去了。你的爱很伟大，但你忘了：没有人需要被拯救，他们需要的是先学会爱自己。而你也一样。",

                    story: "你内心可能有一个“未被拯救的自己”。你希望通过拯救别人，来弥补曾经的无力感。你把爱等同于牺牲，把付出当作爱的证明。",

                    trap: "你容易被“有故事的人”吸引——那些带着伤痛、需要治愈的灵魂。你想用爱融化他们，但往往你融化了自己，他们依然冰冷。",

                    keys: [

                        "分清“帮助”和“拯救”：你可以陪伴，但不需要背负别人的命运。",

                        "设立边界：在付出之前，先问自己：我还能剩多少给自己？",

                        "练习自我关怀：每天做一件纯粹为自己做的事，不为了任何人。"

                    ],

                    ideal: "适合你的人，是已经完整的人。TA不需要你拯救，TA自己就是光。你们在一起，不是互相消耗，而是互相照亮。"

                }

            ];




            // 页面元素

            const coverPage = document.getElementById('coverPage');

            const profilePage = document.getElementById('profilePage');

            const testPage = document.getElementById('testPage');

            const resultPage = document.getElementById('resultPage');

            const startBtn = document.getElementById('startBtn');

            const toTestBtn = document.getElementById('toTestBtn');

            const prevBtn = document.getElementById('prevBtn');

            const nextBtn = document.getElementById('nextBtn');

            const qCount = document.getElementById('qCount');

            const progressFill = document.getElementById('progressFill');

            const qText = document.getElementById('qText');

            const optionsContainer = document.getElementById('optionsContainer');

            const resultTypeName = document.getElementById('resultTypeName');

            const resultDesc = document.getElementById('resultDesc');

            const fullReportDiv = document.getElementById('fullReport');

            const restartBtn = document.getElementById('restartBtn');

            const radarCanvas = document.getElementById('radarChart');




            // 性别选择逻辑

            const genderOptions = document.querySelectorAll('.gender-option');

            let selectedGender = null;

            genderOptions.forEach(opt => {

                opt.addEventListener('click', () => {

                    genderOptions.forEach(o => o.classList.remove('selected'));

                    opt.classList.add('selected');

                    selectedGender = opt.dataset.gender;

                });

            });




            // 状态变量

            let currentPage = 'cover';

            let currentQIndex = 0;

            let answers = new Array(questions.length).fill(null);

            let radarChartInstance = null;




            function showPage(page) {

                coverPage.classList.add('hidden');

                profilePage.classList.add('hidden');

                testPage.classList.add('hidden');

                resultPage.classList.add('hidden');

                if (page === 'cover') coverPage.classList.remove('hidden');

                else if (page === 'profile') profilePage.classList.remove('hidden');

                else if (page === 'test') testPage.classList.remove('hidden');

                else if (page === 'result') resultPage.classList.remove('hidden');

                currentPage = page;

            }




            function renderQuestion() {

                const q = questions[currentQIndex];

                qText.textContent = q.text;

                qCount.textContent = `${currentQIndex+1} / ${questions.length}`;

                progressFill.style.width = `${((currentQIndex+1)/questions.length)*100}%`;




                let html = '';

                q.options.forEach((opt, idx) => {

                    const selectedClass = (answers[currentQIndex] === idx) ? 'selected' : '';

                    html += `<div class="option ${selectedClass}" data-opt-index="${idx}">${opt.text}</div>`;

                });

                optionsContainer.innerHTML = html;




                document.querySelectorAll('.option').forEach(optDiv => {

                    optDiv.addEventListener('click', (e) => {

                        const idx = parseInt(e.target.dataset.optIndex);

                        answers[currentQIndex] = idx;

                        renderQuestion();

                        nextBtn.disabled = false;

                    });

                });




                prevBtn.disabled = (currentQIndex === 0);

                nextBtn.disabled = (answers[currentQIndex] === null);

                nextBtn.textContent = (currentQIndex === questions.length - 1) ? '完成' : '下一题';

            }




            function showResult() {

                let scores = [0,0,0,0];

                for (let i=0; i<answers.length; i++) {

                    if (answers[i] !== null) {

                        const opt = questions[i].options[answers[i]];

                        scores[opt.type] += 1;

                    }

                }

                let maxScore = Math.max(...scores);

                let typeIndex = scores.indexOf(maxScore);




                resultTypeName.textContent = types[typeIndex].name;

                resultDesc.innerHTML = `<p>${types[typeIndex].desc}</p>`;




                const t = types[typeIndex];

                fullReportDiv.innerHTML = `

                    <div class="report-section">

                        <h3>📖 原生家庭故事线</h3>

                        <p>${t.story}</p>

                    </div>

                    <div class="report-section">

                        <h3>🎯 吸引力陷阱地图</h3>

                        <p>${t.trap}</p>

                    </div>

                    <div class="report-section">

                        <h3>🔑 走出循环的3把钥匙</h3>

                        <ul>

                            ${t.keys.map(key => `<li>${key}</li>`).join('')}

                        </ul>

                    </div>

                    <div class="report-section">

                        <h3>💫 适合你的人长什么样</h3>

                        <p>${t.ideal}</p>

                    </div>

                `;




                if (radarChartInstance) radarChartInstance.destroy();

                radarChartInstance = new Chart(radarCanvas, {

                    type: 'radar',

                    data: {

                        labels: ['守护者', '追逐者', '逃离者', '拯救者'],

                        datasets: [{

                            label: '得分',

                            data: scores,

                            backgroundColor: 'rgba(255, 225, 150, 0.2)',

                            borderColor: '#f5d5a0',

                            borderWidth: 2,

                            pointBackgroundColor: '#f5e5d5',

                            pointBorderColor: '#fff',

                            pointRadius: 4

                        }]

                    },

                    options: {

                        responsive: true,

                        maintainAspectRatio: true,

                        plugins: { legend: { display: false }, tooltip: { enabled: false } },

                        scales: {

                            r: {

                                beginAtZero: true,

                                grid: { color: 'rgba(255,255,255,0.1)' },

                                angleLines: { color: 'rgba(255,255,255,0.2)' },

                                pointLabels: { color: '#e0d8d0', font: { size: 11 } },

                                ticks: { display: false, stepSize: 1 }

                            }

                        }

                    }

                });




                showPage('result');

            }




            function resetTest() {

                currentQIndex = 0;

                answers = new Array(questions.length).fill(null);

                // 可选：重置性别选择高亮

                genderOptions.forEach(o => o.classList.remove('selected'));

                selectedGender = null;

                document.getElementById('ageInput').value = '';

                document.getElementById('occupationSelect').value = '';

                showPage('cover');

            }




            // 事件绑定

            startBtn.addEventListener('click', () => {

                showPage('profile');

            });




            toTestBtn.addEventListener('click', () => {

                // 可以简单验证，但不必强制

                showPage('test');

                renderQuestion();

            });




            prevBtn.addEventListener('click', () => {

                if (currentQIndex > 0) {

                    currentQIndex--;

                    renderQuestion();

                }

            });




            nextBtn.addEventListener('click', () => {

                if (answers[currentQIndex] === null) return;

                if (currentQIndex === questions.length - 1) {

                    let firstNull = answers.findIndex(a => a === null);

                    if (firstNull !== -1) {

                        currentQIndex = firstNull;

                        renderQuestion();

                        return;

                    }

                    showResult();

                } else {

                    currentQIndex++;

                    renderQuestion();

                }

            });




            restartBtn.addEventListener('click', resetTest);




            showPage('cover');

        })();

    </script>

</body>

</html>
